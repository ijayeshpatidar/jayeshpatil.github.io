<body>
    <!-- hello, universe! -->
    <main id="content">
        <h1 id="fullName">Jayesh Patil</h1>
        <nav id="links">
            <a id="github" href="https://github.com/ijayeshpatidar?tab=repositories" target="_blank">Github</a>

    <script src="js/vendor/modernizr-3.11.2.min.js"></script>

    <script src="js/main.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.6.0/jquery.min.js"

        crossorigin="anonymous" referrerpolicy="no-referrer"></script>
    <script>
        // https://stackoverflow.com/a/32445401
        $(function () {
            let count = 0;
            const wordsArray = [
                "ジェイシュ・パティル",
                "제이쉬 파틸",
                "जयेश पाटिल",
                "જયેશ પાટિલ",
                "জয়েশ পাটিল",
                "ಜಯೇಶ್ ಪಾಟೀಲ್",
                "Джаеш Патил",
                "جیش پاٹل",
                "Jayesh Patil"
            ];
            setInterval(function () {
                count++;
                $("#fullName").fadeOut(400, function () {
                    $(this)
                        .text(wordsArray[count % wordsArray.length])
                        .fadeIn(400);
                });
            }, 2000);
            $("#fullName").mouseover(function () {
                $("#fullName").fadeOut(400, function () {
                    $("#fullName").text("Jayesh Patil").fadeIn(400);
                });
            });
        });
    </script>
